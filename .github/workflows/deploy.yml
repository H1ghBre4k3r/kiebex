name: Deploy

on:
  workflow_call:

jobs:
  update-deployment:
    name: Update Deployment
    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - name: Check Out The Repository
        uses: actions/checkout@v6
      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"
      - name: Update Deploy Branch
        run: |
          cp -r manifests/ /tmp/manifests/
          git fetch origin deploy 2>/dev/null || true
          git switch -C deploy origin/deploy 2>/dev/null || git switch -C deploy
          cp -r /tmp/manifests/ manifests/
      - name: Update Version In Checked-Out Code
        run: |
          sed -i "s|image: ghcr.io/.*/kiebex-migrate:.*|image: ghcr.io/${{ env.OWNER_LC }}/kiebex-migrate:${{ github.sha }}|" ${GITHUB_WORKSPACE}/manifests/deployment.yml
          sed -i "s|image: ghcr.io/.*/kiebex:.*|image: ghcr.io/${{ env.OWNER_LC }}/kiebex:${{ github.sha }}|" ${GITHUB_WORKSPACE}/manifests/deployment.yml
      - name: Commit The New Image Reference
        uses: stefanzweifel/git-auto-commit-action@v7
        if: ${{ github.ref_name == 'main' }}
        with:
          commit_message: Deploy new image ${{ github.sha }}
          branch: deploy
          commit_options: "--no-verify --signoff"
          push_options: "--force"
          repository: .
          commit_user_name: PescaDev GitOps Bot
          commit_user_email: gitops@pesca.dev
          commit_author: PescaDev GitOps <gitops@pesca.dev>
