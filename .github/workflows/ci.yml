name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-unit:
    name: Lint, Typecheck, Unit/API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit/API tests
        run: npm run test

  integration-and-e2e:
    name: Integration + E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kiel_beer_index_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kiel_beer_index_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kiel_beer_index_ci
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Apply database migrations
        run: npm run db:deploy

      - name: Seed database
        run: npm run db:seed

      - name: Integration tests
        run: npm run test:integration

      - name: Contract tests
        run: npm run test:contract:ci

      - name: E2E tests
        run: npm run test:e2e

  rust-api:
    name: Rust API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Check formatting
        run: npm run api:fmt:check

      - name: Check compilation
        run: npm run api:check

      - name: Clippy
        run: npm run api:clippy

      - name: Tests
        run: npm run api:test

      - name: Release build
        run: npm run api:build

  image:
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    needs:
      - integration-and-e2e
      - lint-typecheck-unit
      - rust-api
    uses: ./.github/workflows/image.yml
    secrets: inherit

  deploy:
    if: github.event_name == 'push'
    permissions:
      contents: write
    needs: image
    uses: ./.github/workflows/deploy.yml
    secrets: inherit

  review-app-image:
    name: Build & Push Review App Image
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
    needs:
      - lint-typecheck-unit
      - integration-and-e2e
      - rust-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64/v8
          context: .
          target: runner
          push: true
          cache-from: type=gha,scope=kiebex
          cache-to: type=gha,scope=kiebex,mode=max
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/kiebex:pr-${{ github.event.number }}-${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/kiebex:pr-${{ github.event.number }}

      - name: Build and push migrate image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64/v8
          context: .
          target: migrator
          push: true
          cache-from: |
            type=gha,scope=kiebex-migrate
            type=gha,scope=kiebex
          cache-to: type=gha,scope=kiebex-migrate,mode=max
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/kiebex-migrate:pr-${{ github.event.number }}-${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/kiebex-migrate:pr-${{ github.event.number }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64/v8
          context: .
          target: api-runner
          push: true
          cache-from: type=gha,scope=kiebex-api
          cache-to: type=gha,scope=kiebex-api,mode=max
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/kiebex-api:pr-${{ github.event.number }}-${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/kiebex-api:pr-${{ github.event.number }}

  review-app-deploy:
    name: Deploy Review App
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      deployments: write
      pull-requests: write
    needs: review-app-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set environment variables
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
          echo "PR_NUMBER=${{ github.event.number }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=pr-${{ github.event.number }}-${{ github.sha }}" >> $GITHUB_ENV
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Create GitHub Deployment
        id: create-deployment
        run: |
          DEPLOYMENT_ID=$(gh api repos/${{ github.repository }}/deployments \
            --method POST \
            --input - \
            --jq '.id' <<EOF
          {
            "ref": "${{ github.sha }}",
            "environment": "review/pr-${{ github.event.number }}",
            "description": "Review app for PR #${{ github.event.number }}",
            "auto_merge": false,
            "required_contexts": []
          }
          EOF
          )
          echo "deployment_id=${DEPLOYMENT_ID}" >> $GITHUB_OUTPUT
          gh api repos/${{ github.repository }}/deployments/${DEPLOYMENT_ID}/statuses \
            --method POST \
            -f state=pending
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate manifests
        run: |
          DEST=$(mktemp -d)
          for f in manifests/review-app/*.yml; do
            envsubst '$PR_NUMBER $OWNER_LC $IMAGE_TAG' \
              < "$f" > "$DEST/$(basename $f)"
          done
          echo "MANIFEST_DIR=$DEST" >> $GITHUB_ENV

      - name: Push manifests to deploy branch
        run: |
          git config user.email "gitops@pesca.dev"
          git config user.name "PescaDev GitOps Bot"
          git fetch origin deploy 2>/dev/null || true
          git switch -C deploy origin/deploy 2>/dev/null || git switch --orphan deploy
          mkdir -p review-apps/pr-${{ github.event.number }}
          cp "$MANIFEST_DIR"/*.yml review-apps/pr-${{ github.event.number }}/
          git add review-apps/pr-${{ github.event.number }}/
          git diff --cached --quiet || \
            git commit --no-verify --signoff \
              -m "Deploy review app for pr-${{ github.event.number }} @ ${{ github.sha }}"
          git push origin deploy --force

      - name: Mark deployment success
        if: success()
        run: |
          gh api repos/${{ github.repository }}/deployments/${{ steps.create-deployment.outputs.deployment_id }}/statuses \
            --method POST \
            -f state=success
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        if: success()
        run: |
          BODY='## Review App Deployed

          | | |
          |---|---|
          | **URL** | https://pr-${{ github.event.number }}.review.kiel.beer *(VPN required)* |
          | **Image** | `pr-${{ github.event.number }}-${{ github.sha }}` |
          | **Commit** | `${{ github.sha }}` |
          | **Admin email** | `admin@review.kiel.beer` |
          | **Admin password** | `review` |

          Database seeded with sample locations, beers, offers, and reviews.

          > ArgoCD syncs automatically. The app will be reachable once the `migrate` init container completes.'
          gh pr comment ${{ github.event.number }} --edit-last --body "$BODY" 2>/dev/null || \
            gh pr comment ${{ github.event.number }} --body "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark deployment failure
        if: failure() && steps.create-deployment.outputs.deployment_id != ''
        run: |
          gh api repos/${{ github.repository }}/deployments/${{ steps.create-deployment.outputs.deployment_id }}/statuses \
            --method POST \
            -f state=failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
