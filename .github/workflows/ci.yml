name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-unit:
    name: Lint, Typecheck, Unit/API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit/API tests
        run: npm run test

  integration-and-e2e:
    name: Integration + E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kiel_beer_index_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kiel_beer_index_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kiel_beer_index_ci
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Apply database migrations
        run: npm run db:deploy

      - name: Seed database
        run: npm run db:seed

      - name: Integration tests
        run: npm run test:integration

      - name: E2E tests
        run: npm run test:e2e

  image:
    permissions:
      contents: read
      packages: write
    needs:
      - integration-and-e2e
      - lint-typecheck-unit
    uses: ./.github/workflows/image.yml
    secrets: inherit
