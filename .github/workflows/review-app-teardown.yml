name: Review App Teardown

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  teardown:
    name: Tear Down Review App
    permissions:
      contents: write
      deployments: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set lower case owner name
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Configure git
        run: |
          git config user.email "gitops@pesca.dev"
          git config user.name "PescaDev GitOps Bot"

      - name: Remove from deploy branch
        run: |
          git fetch origin deploy
          git switch -C deploy origin/deploy
          if [ -d "review-apps/pr-${{ github.event.number }}" ]; then
            git rm -rf "review-apps/pr-${{ github.event.number }}/"
            git commit --no-verify --signoff \
              -m "Teardown review app for pr-${{ github.event.number }}"
            git push origin deploy --force
          fi

      - name: Mark GitHub Deployment inactive
        run: |
          DEPLOYMENT_ID=$(gh api "repos/${{ github.repository }}/deployments" \
            --jq "[.[] | select(.environment == \"review/pr-${{ github.event.number }}\")] | first | .id")
          if [ -n "$DEPLOYMENT_ID" ] && [ "$DEPLOYMENT_ID" != "null" ]; then
            gh api "repos/${{ github.repository }}/deployments/${DEPLOYMENT_ID}/statuses" \
              --method POST \
              -f state=inactive
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete PR images from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER_TYPE=$(gh api "repos/${{ github.repository }}" --jq '.owner.type')
          if [ "$OWNER_TYPE" = "Organization" ]; then
            PKG_BASE="orgs/${OWNER_LC}/packages/container"
          else
            PKG_BASE="users/${OWNER_LC}/packages/container"
          fi

          PR_PREFIX="pr-${{ github.event.number }}"

          for pkg in kiebex kiebex-migrate; do
            VERSIONS=$(gh api "${PKG_BASE}/${pkg}/versions?per_page=100" 2>/dev/null || echo "[]")
            IDS=$(echo "$VERSIONS" | jq -r \
              --arg prefix "${PR_PREFIX}" \
              '[.[] | select(.metadata.container.tags | map(startswith($prefix + "-") or . == $prefix) | any)] | .[].id')
            for id in $IDS; do
              echo "Deleting ${pkg} version ${id} (${PR_PREFIX})"
              gh api "${PKG_BASE}/${pkg}/versions/${id}" --method DELETE || true
            done
          done
