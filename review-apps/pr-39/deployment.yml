apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiebex
  namespace: kiebex-pr-39
  labels:
    app: kiebex
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kiebex
  template:
    metadata:
      labels:
        app: kiebex
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/h1ghbre4k3r/kiebex-migrate:pr-39-3d3703ca16394c008a4de453952989189cc95977
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              node node_modules/prisma/build/index.js migrate deploy &&
              node node_modules/.bin/tsx prisma/seed.ts &&
              node prisma/seed-admin.mjs
          envFrom:
            - secretRef:
                name: kiebex-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      containers:
        - name: kiebex
          image: ghcr.io/h1ghbre4k3r/kiebex:pr-39-3d3703ca16394c008a4de453952989189cc95977
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: kiebex-secret
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 5
      restartPolicy: Always
