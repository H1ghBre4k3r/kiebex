apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: kiebex-deployment
  name: kiebex-deployment
  namespace: kiebex
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: kiebex-deployment
  strategy: {}
  template:
    metadata:
      labels:
        io.kompose.service: kiebex-deployment
    spec:
      containers:
        - image: ghcr.io/h1ghbre4k3r/kiebex:latest
          imagePullPolicy: Always
          name: kiebex-deployment
          ports:
            - containerPort: 80
          resources: {}
      restartPolicy: Always
status: {}
