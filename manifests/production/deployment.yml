apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiebex
  namespace: kiebex
  labels:
    app: kiebex
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kiebex
  template:
    metadata:
      labels:
        app: kiebex
    spec:
      containers:
        - name: kiebex
          image: ghcr.io/h1ghbre4k3r/kiebex:974f9c40aa95165ad650eb940c287a2d51a8e454
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: kiebex-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 5
      restartPolicy: Always
