apiVersion: batch/v1
kind: Job
metadata:
  name: kiebex-migrate
  namespace: kiebex
  labels:
    app: kiebex
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: kiebex-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/h1ghbre4k3r/kiebex:latest
          imagePullPolicy: Always
          command: ["node", "node_modules/.bin/prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: kiebex-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
